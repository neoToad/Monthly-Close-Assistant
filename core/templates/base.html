<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Monthly Close Assistant{% endblock %}</title>

    <!--
        HTMX is wired in here so every child template gets server-rendered partial
        updates (hx-get / hx-post) without a separate SPA. This is an internal review
        tool; the script is loaded from the unpkg CDN, no build step required.
    -->
    <script src="https://unpkg.com/htmx.org" defer></script>

    <style>
        :root {
            --bg: #f7f7f8;
            --fg: #1f2328;
            --muted: #6b7280;
            --border: #e5e7eb;
            --accent: #2563eb;
            --danger: #b91c1c;
            --ok: #15803d;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: system-ui, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--fg);
            line-height: 1.5;
        }
        header {
            background: #fff;
            border-bottom: 1px solid var(--border);
            padding: 0.6rem 1rem;
        }
        header a {
            color: var(--fg);
            text-decoration: none;
            font-weight: 600;
        }
        main { max-width: 960px; margin: 0 auto; padding: 1rem; }
        h1, h2, h3 { margin-top: 0; }
        table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
        th, td { border: 1px solid var(--border); padding: 0.4rem 0.6rem; text-align: left; }
        th { background: #fff; }
        button, .btn {
            font: inherit;
            padding: 0.3rem 0.7rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
        }
        button.primary, .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
        .muted { color: var(--muted); }
        .flash { padding: 0.6rem 0.8rem; border-radius: 6px; margin: 0.5rem 0; }
        .flash.info { background: #eff6ff; border: 1px solid #bfdbfe; }
        .flash.warn { background: #fffbeb; border: 1px solid #fde68a; }
        .flash.error { background: #fef2f2; border: 1px solid #fecaca; }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body>
    <header>
        <nav><a href="/">Monthly Close Assistant</a></nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
