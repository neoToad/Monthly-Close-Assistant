{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Monthly Close Assistant{% endblock %}</title>

    <!--
        HTMX is wired in here so every child template gets server-rendered partial
        updates (hx-get / hx-post) without a separate SPA. This is an internal review
        tool; the script is loaded from the unpkg CDN, no build step required.
    -->
    <script src="https://unpkg.com/htmx.org" defer></script>

    <!-- Ledger design-system fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Design tokens and base styles -->
    <link rel="stylesheet" href="{% static 'css/tokens.css' %}">

    {% block extra_head %}{% endblock %}
</head>
<body>
    {% block page_header %}{% endblock %}

    <main>
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
