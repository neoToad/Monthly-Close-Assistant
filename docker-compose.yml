# Monthly Close Assistant — local Docker Compose stack (Prompt 15).
# Brings up Postgres, Redis, the Django web app, and Celery worker/beat containers.
# Copy `.env.example` to `.env` and customize values before running:
#   docker compose up --build
#
# Secrets live only in the gitignored `.env` file. docker-compose.yml keeps only the
# service-networking overrides (db/redis hostnames) so the same `.env` works for
# host-based local dev and containerized local dev.

services:
  db:
    image: postgres:17-alpine
    env_file: .env
    environment:
      # Map the app's DB_* variables to Postgres container variables.
      POSTGRES_DB: ${DB_NAME:-close_assistant}
      POSTGRES_USER: ${DB_USER:-close_app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-close_dev_pw}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    env_file: .env
    environment:
      # Force the app to talk to the compose service hostnames.
      DATABASE_URL: postgres://${DB_USER:-close_app}:${DB_PASSWORD:-close_dev_pw}@db:5432/${DB_NAME:-close_assistant}
      DB_HOST: db
      DB_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A close_assistant worker -l info
    env_file: .env
    environment:
      DATABASE_URL: postgres://${DB_USER:-close_app}:${DB_PASSWORD:-close_dev_pw}@db:5432/${DB_NAME:-close_assistant}
      DB_HOST: db
      DB_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - db
      - redis

  beat:
    build: .
    command: celery -A close_assistant beat -l info
    env_file: .env
    environment:
      DATABASE_URL: postgres://${DB_USER:-close_app}:${DB_PASSWORD:-close_dev_pw}@db:5432/${DB_NAME:-close_assistant}
      DB_HOST: db
      DB_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - db
      - redis

volumes:
  pgdata:
